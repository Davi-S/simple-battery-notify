# Configuration for battery notifications

# Notification timeout in milliseconds
TIMEOUT=2000

# ==========================================
# Battery Event Levels
# ==========================================
# Define custom battery thresholds and their corresponding actions.
# Format: 'PERCENTAGE|URGENCY|TITLE|MESSAGE|COMMAND'
#
# Fields:
# 1. PERCENTAGE: The exact battery percentage to trigger this rule.
# 2. URGENCY: 'low', 'normal', or 'critical' (Standard notify-send urgencies).
# 3. TITLE: The notification title.
# 4. MESSAGE: The notification body. Use '%LEVEL%' and '%TIME%' as placeholders.
# 5. COMMAND (Optional): A custom command to execute when this level is hit.

BATTERY_LEVELS=(
    # --- Fully Charged ---
    '100|normal|Battery Full|Battery is fully charged. You can unplug!|'
    
    # --- Custom Milestones ---
    '80|normal|Battery Status|Battery is at %LEVEL%%. Optimal to unplug.|'
    '50|low|Battery Halfway|You are at %LEVEL%% capacity.|'
    
    # --- Low Battery Warnings ---
    '30|normal|Battery Low|Battery is at %LEVEL%% (%TIME% remaining).|'
    '15|critical|Battery Critical|Connect the charger! Only %LEVEL%% remaining.|'
    
    # --- Emergency Action ---
    '5|critical|System Suspend|Battery at %LEVEL%%! Suspending to prevent data loss.|systemctl suspend'
)
